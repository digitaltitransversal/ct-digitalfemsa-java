name: Publish package to the Maven Central Repository

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8 for Maven Central publish
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'
        cache: maven
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_SIGNING_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE
      env:
        MAVEN_USERNAME: ${{ secrets.MVN_CENTRAL_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MVN_CENTRAL_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_SIGNING_KEY_PASSPHRASE }}

    - name: GPG Debug
      run: |
        gpg --list-keys
        gpg --list-secret-keys

    - name: Publish to Apache Maven Central
      run: mvn -B -ntp clean deploy -Dmaven.test.skip -P sign-artifacts
      env:
        MAVEN_USERNAME: ${{ secrets.MVN_CENTRAL_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MVN_CENTRAL_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_SIGNING_KEY_PASSPHRASE }}
